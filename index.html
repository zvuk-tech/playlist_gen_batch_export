<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Batch Export</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- ZIP libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root{
      --bg:#0b0b0e; --panel:#111118; --border:rgba(255,255,255,.12);
      --text:#fff; --muted:rgba(255,255,255,.7);
      --btn:#1f6fff; --btn2:#2a2a35; --btn3:#1d1d27;
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Inter",Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:16px;
      padding:16px;
      align-items:start;
      min-height:100vh;
    }
    #canvas-container{
      background:#000;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:640px;

      /* ✅ важное: правильные слои */
      position:relative;
      z-index:1;
    }
    /* ✅ canvas не должен перехватывать клики по панели (на GitHub Pages часто “накрывает” UI) */
    #canvas-container canvas{
      position:relative;
      z-index:1;
      pointer-events:none;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;

      /* ✅ панель ВСЕГДА поверх */
      position:relative;
      z-index:10;
      pointer-events:auto;
    }
    .title{font-size:14px; font-weight:800; margin:0 0 10px}
    .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    label{font-size:12px; color:var(--muted)}
    select, input[type="number"]{
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0e0e14;
      color:var(--text);
      outline:none;
    }
    select{ min-width:120px; }
    input[type="number"]{ width:120px; }
    button{
      border:0;
      padding:10px 12px;
      border-radius:12px;
      color:var(--text);
      cursor:pointer;
      font-weight:800;
      background:var(--btn3);
    }
    #batchZipBtn{ background:var(--btn); }
    #batchStopBtn{ background:var(--btn2); }
    #previewRandomBtn{ background:#232334; }
    #batchStatus{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      word-break:break-word;
    }
    .hint{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.55);
      line-height:1.35;
    }
    code{color:rgba(255,255,255,.78)}
    @media (max-width: 980px){
      .wrap{ grid-template-columns: 1fr; }
      #canvas-container{ min-height:520px; }
    }
  </style>

  <script src="sketch.js" defer></script>
</head>

<body>
  <div class="wrap">
    <div id="canvas-container"></div>

    <div class="panel">
      <h1 class="title">ZIP Export</h1>

      <div class="row" style="margin-bottom:10px">
        <div style="display:flex; flex-direction:column; gap:6px">
          <label>Preset</label>
          <select id="presetSelect">
            <option value="LOW">LOW</option>
            <option value="MID">MID</option>
            <option value="MAX">MAX</option>
          </select>
        </div>

        <div style="display:flex; flex-direction:column; gap:6px">
          <label>Количество</label>
          <input id="batchCount" type="number" min="1" max="5000" step="1" value="30" />
        </div>
      </div>

      <div class="row">
        <!-- ✅ type="button" чтобы ничего не пыталось submit'иться -->
        <button id="batchZipBtn" type="button">Скачать ZIP</button>
        <button id="batchStopBtn" type="button">Стоп</button>
        <button id="previewRandomBtn" type="button">Рандом превью</button>
      </div>

      <div id="batchStatus">Готов.</div>
    </div>
  </div>
</body>
</html>
